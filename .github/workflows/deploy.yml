name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. Checkout repository
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Configure Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 3. Upload entire repo as artifact (static site – no build step needed)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'   # upload repo root (index.html + js/)

      # 4. Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
