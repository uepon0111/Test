<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>単語帳</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Outfit:wght@500;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── Variables ───────────────────────────────── */
    :root {
      --bg:          #070f1d;
      --surface:     #0d1b33;
      --card:        #0f2244;
      --card-hover:  #142e5a;
      --border:      #1b3660;
      --border-light:#254d8a;
      --primary:     #3d8ef5;
      --primary-h:   #6aadff;
      --primary-dk:  #1a66d6;
      --accent:      #00bfae;
      --text:        #deeeff;
      --text-s:      #6b9fd6;
      --text-d:      #2d5a8a;
      --star:        #f59e0b;
      --danger:      #ef4444;
      --r:           14px;
      --r-sm:        8px;
      --r-lg:        22px;
      --shadow:      0 4px 24px rgba(0,0,0,.5);
      --shadow-lg:   0 8px 48px rgba(0,0,0,.7);
      --nav-h:       68px;
      --sidebar-w:   230px;
      --transition:  .25s cubic-bezier(.4,0,.2,1);
    }

    /* ── Reset ───────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
    input  { font-family: inherit; }
    a      { color: inherit; text-decoration: none; }
    ul, ol { list-style: none; }

    /* ── App shell ───────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    /* ── Screens ─────────────────────────────────── */
    .screen {
      position: absolute;
      inset: 0;
      bottom: var(--nav-h);
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transform: translateY(12px);
      transition: opacity var(--transition), transform var(--transition);
      overflow: hidden;
    }
    .screen.active {
      opacity: 1;
      pointer-events: all;
      transform: translateY(0);
    }

    /* ── Bottom nav (mobile / portrait) ─────────── */
    #bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: stretch;
      z-index: 100;
      backdrop-filter: blur(10px);
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      font-size: 11px;
      color: var(--text-d);
      transition: color var(--transition), background var(--transition);
      border-radius: var(--r-sm);
      margin: 6px 4px;
    }
    .nav-btn i { font-size: 20px; }
    .nav-btn.active {
      color: var(--primary);
      background: rgba(61,142,245,.12);
    }
    .nav-btn:hover { color: var(--primary-h); }

    /* ── Scrollable area ─────────────────────────── */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }
    .scroll-area::-webkit-scrollbar { width: 5px; }
    .scroll-area::-webkit-scrollbar-track { background: transparent; }
    .scroll-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    /* ── Common header ───────────────────────────── */
    .screen-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      min-height: 58px;
    }
    .screen-header h2 {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: .02em;
      flex: 1;
    }
    .icon-btn {
      width: 38px; height: 38px;
      border-radius: var(--r-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      color: var(--text-s);
      transition: background var(--transition), color var(--transition);
    }
    .icon-btn:hover  { background: rgba(255,255,255,.07); color: var(--text); }
    .icon-btn.active { background: rgba(61,142,245,.2); color: var(--primary); }

    /* ═══════════════════════════════════════════════
       HOME SCREEN
    ═══════════════════════════════════════════════ */
    #screen-home {
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 32px 24px;
    }
    .home-hero {
      text-align: center;
      margin-bottom: 48px;
    }
    .home-logo {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, var(--primary-dk), var(--primary));
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      color: #fff;
      margin: 0 auto 20px;
      box-shadow: 0 8px 32px rgba(61,142,245,.4);
    }
    .home-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 32px;
      letter-spacing: -.01em;
      background: linear-gradient(90deg, var(--primary-h), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .home-subtitle {
      color: var(--text-s);
      font-size: 13px;
      margin-top: 6px;
    }
    .home-stat {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 5px 14px;
      font-size: 13px;
      color: var(--text-s);
      margin-top: 16px;
    }
    .home-stat strong { color: var(--primary-h); font-family: 'DM Mono', monospace; }

    .home-actions {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 340px;
    }
    .home-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 22px 24px;
      display: flex;
      align-items: center;
      gap: 18px;
      cursor: pointer;
      transition: background var(--transition), border-color var(--transition), transform var(--transition), box-shadow var(--transition);
    }
    .home-card:hover {
      background: var(--card-hover);
      border-color: var(--primary);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(61,142,245,.2);
    }
    .home-card-icon {
      width: 52px; height: 52px;
      border-radius: var(--r);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .home-card-icon.blue   { background: rgba(61,142,245,.15); color: var(--primary); }
    .home-card-icon.teal   { background: rgba(0,191,174,.15);  color: var(--accent); }
    .home-card-body h3 {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 16px;
    }
    .home-card-body p { font-size: 12px; color: var(--text-s); margin-top: 2px; }
    .home-card-arrow { margin-left: auto; color: var(--text-d); font-size: 14px; }

    /* ═══════════════════════════════════════════════
       LIST SCREEN
    ═══════════════════════════════════════════════ */
    #screen-list .toolbar {
      display: flex;
      flex-direction: column;
      gap: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .search-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      display: none;
    }
    .search-bar.open { display: flex; }
    .search-bar i { color: var(--text-s); font-size: 14px; }
    .search-bar input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 14px;
    }
    .search-bar input::placeholder { color: var(--text-d); }
    .search-clear { color: var(--text-d); font-size: 13px; padding: 4px; }
    .search-clear:hover { color: var(--text); }

    .filter-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .filter-row::-webkit-scrollbar { display: none; }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--border);
      color: var(--text-s);
      background: var(--card);
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .chip:hover   { border-color: var(--primary); color: var(--primary); }
    .chip.active  { background: rgba(61,142,245,.2); border-color: var(--primary); color: var(--primary-h); }
    .chip i { font-size: 11px; }

    /* Word list */
    .word-list { padding: 10px 12px; display: flex; flex-direction: column; gap: 8px; }
    .word-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 14px 16px;
      display: grid;
      grid-template-columns: 44px 1fr auto;
      grid-template-rows: auto auto;
      column-gap: 12px;
      align-items: start;
      transition: border-color var(--transition), background var(--transition);
    }
    .word-card:hover { border-color: var(--border-light); background: var(--card-hover); }
    .word-num {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-d);
      background: rgba(61,142,245,.1);
      border: 1px solid rgba(61,142,245,.2);
      border-radius: 6px;
      padding: 2px 0;
      text-align: center;
      align-self: center;
      grid-row: 1 / 3;
    }
    .word-en {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -.01em;
      color: var(--text);
      align-self: center;
    }
    .word-jp {
      font-size: 13px;
      color: var(--text-s);
      margin-top: 3px;
      grid-column: 2;
      line-height: 1.5;
    }
    .word-jp.hidden { filter: blur(6px); user-select: none; cursor: pointer; }
    .word-jp.hidden:hover { filter: blur(3px); }
    .word-controls {
      display: flex;
      flex-direction: column;
      gap: 4px;
      grid-row: 1 / 3;
      align-items: center;
    }
    .star-btn {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      color: var(--text-d);
      transition: all var(--transition);
    }
    .star-btn:hover         { color: var(--star); background: rgba(245,158,11,.12); }
    .star-btn.starred i     { color: var(--star); }
    .toggle-meaning-btn {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      color: var(--text-d);
      transition: all var(--transition);
    }
    .toggle-meaning-btn:hover { color: var(--accent); background: rgba(0,191,174,.1); }
    .toggle-meaning-btn.revealed { color: var(--accent); }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-d);
    }
    .empty-state i { font-size: 40px; margin-bottom: 12px; display: block; }
    .empty-state p { font-size: 14px; }

    /* ═══════════════════════════════════════════════
       QUIZ SCREEN
    ═══════════════════════════════════════════════ */
    #screen-quiz { overflow: hidden; }
    #quiz-setup {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      gap: 28px;
    }
    #quiz-card-view {
      flex: 1;
      display: none;
      flex-direction: column;
      align-items: stretch;
    }
    #quiz-card-view.active { display: flex; }

    .setup-title {
      text-align: center;
    }
    .setup-title h2 {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 24px;
      margin-bottom: 4px;
    }
    .setup-title p { color: var(--text-s); font-size: 13px; }

    .setup-group {
      width: 100%;
      max-width: 360px;
    }
    .setup-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-d);
      margin-bottom: 10px;
    }
    .option-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .option-grid.three { grid-template-columns: 1fr 1fr 1fr; }
    .option-btn {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 12px 10px;
      text-align: center;
      cursor: pointer;
      transition: all var(--transition);
      font-size: 13px;
      color: var(--text-s);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .option-btn i { font-size: 18px; }
    .option-btn:hover { border-color: var(--primary); color: var(--primary-h); }
    .option-btn.selected {
      background: rgba(61,142,245,.15);
      border-color: var(--primary);
      color: var(--primary-h);
      box-shadow: 0 0 0 3px rgba(61,142,245,.15);
    }

    .start-btn {
      width: 100%;
      max-width: 360px;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary-dk), var(--primary));
      border-radius: var(--r-lg);
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 16px;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all var(--transition);
      box-shadow: 0 4px 24px rgba(61,142,245,.35);
    }
    .start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(61,142,245,.5); }
    .start-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    /* Quiz progress */
    .quiz-progress-bar-wrap {
      flex-shrink: 0;
      padding: 14px 20px 0;
    }
    .quiz-progress-text {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-s);
      margin-bottom: 6px;
    }
    .quiz-progress-track {
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .quiz-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary-dk), var(--primary));
      border-radius: 99px;
      transition: width .4s cubic-bezier(.4,0,.2,1);
    }

    /* Quiz card */
    .quiz-card-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .quiz-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 36px 28px;
      width: 100%;
      max-width: 480px;
      text-align: center;
      position: relative;
      box-shadow: var(--shadow-lg);
    }
    .quiz-word-num {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--text-d);
      background: rgba(61,142,245,.1);
      border: 1px solid rgba(61,142,245,.2);
      border-radius: 6px;
      padding: 3px 10px;
      display: inline-block;
      margin-bottom: 24px;
    }
    .quiz-word {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 42px;
      letter-spacing: -.02em;
      color: var(--text);
      margin-bottom: 28px;
      line-height: 1.15;
    }
    .quiz-meaning {
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .quiz-meaning-text {
      font-size: 16px;
      color: var(--accent);
      line-height: 1.6;
      font-weight: 500;
    }
    .quiz-meaning-hidden {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-d);
      font-size: 13px;
    }
    .quiz-card-fav {
      position: absolute;
      top: 14px; right: 14px;
      width: 38px; height: 38px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      color: var(--text-d);
      transition: all var(--transition);
    }
    .quiz-card-fav:hover     { color: var(--star); background: rgba(245,158,11,.12); }
    .quiz-card-fav.starred i { color: var(--star); }

    /* Quiz footer */
    .quiz-footer {
      flex-shrink: 0;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    .quiz-nav-btn {
      width: 48px; height: 48px;
      border-radius: var(--r);
      background: var(--card);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      color: var(--text-s);
      transition: all var(--transition);
      flex-shrink: 0;
    }
    .quiz-nav-btn:hover:not(:disabled) { background: var(--card-hover); border-color: var(--primary); color: var(--primary); }
    .quiz-nav-btn:disabled { opacity: .3; cursor: not-allowed; }
    .quiz-reveal-btn {
      flex: 1;
      height: 48px;
      border-radius: var(--r);
      background: rgba(0,191,174,.12);
      border: 1px solid rgba(0,191,174,.3);
      color: var(--accent);
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      gap: 8px;
      transition: all var(--transition);
    }
    .quiz-reveal-btn:hover { background: rgba(0,191,174,.2); }
    .quiz-end-btn {
      padding: 0 16px;
      height: 48px;
      border-radius: var(--r);
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text-s);
      font-size: 13px;
      display: flex; align-items: center; gap: 6px;
      transition: all var(--transition);
      flex-shrink: 0;
    }
    .quiz-end-btn:hover { color: var(--danger); border-color: var(--danger); background: rgba(239,68,68,.08); }

    /* Loading / Error */
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; background: var(--bg); z-index: 999;
      color: var(--text-s);
    }
    #loading .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    #loading p { font-size: 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ═══════════════════════════════════════════════
       LANDSCAPE / DESKTOP LAYOUT (≥ 768px wide)
    ═══════════════════════════════════════════════ */
    @media (min-width: 768px) {
      :root { --nav-h: 0px; }

      #app { flex-direction: row; }

      /* Sidebar nav */
      #bottom-nav {
        position: static;
        width: var(--sidebar-w);
        height: 100%;
        flex-direction: column;
        border-top: none;
        border-right: 1px solid var(--border);
        padding: 32px 16px;
        gap: 4px;
        justify-content: flex-start;
        align-items: stretch;
      }
      .sidebar-logo {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 8px 28px;
      }
      .sidebar-logo-icon {
        width: 38px; height: 38px;
        border-radius: 10px;
        background: linear-gradient(135deg, var(--primary-dk), var(--primary));
        display: flex; align-items: center; justify-content: center;
        font-size: 16px; color: #fff;
      }
      .sidebar-logo-text {
        font-family: 'Outfit', sans-serif;
        font-weight: 800;
        font-size: 17px;
        letter-spacing: -.01em;
        background: linear-gradient(90deg, var(--primary-h), var(--accent));
        -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      }
      .nav-btn {
        flex: none;
        flex-direction: row;
        justify-content: flex-start;
        gap: 12px;
        font-size: 14px;
        padding: 12px 14px;
        border-radius: var(--r-sm);
        margin: 0;
      }
      .nav-btn i { font-size: 17px; }

      /* Content area */
      .screen-container {
        flex: 1;
        position: relative;
        overflow: hidden;
        height: 100%;
      }
      .screen { bottom: 0; }

      /* Home adjustments */
      #screen-home { padding: 48px 64px; }
      .home-actions { max-width: 420px; }
      .home-actions { flex-direction: row; flex-wrap: wrap; }
      .home-card { flex: 1; min-width: 180px; }

      /* List adjustments */
      .word-list { padding: 14px 20px; gap: 10px; }
      .word-card { padding: 16px 18px; }

      /* Quiz adjustments */
      .quiz-card { padding: 48px 40px; }
      .quiz-word { font-size: 56px; }
    }

    /* ── Utility ──────────────────────────────────── */
    .hidden-el  { display: none !important; }
    .fade-in    { animation: fadeIn .3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>単語データを読み込み中…</p>
</div>

<div id="app" style="display:none;">

  <!-- ── Navigation ────────────────────────────── -->

    </div>
    <button class="nav-btn active" data-screen="home">
      <i class="fa-solid fa-house"></i><span>ホーム</span>
    </button>
    <button class="nav-btn" data-screen="list">
      <i class="fa-solid fa-list"></i><span>一覧</span>
    </button>
    <button class="nav-btn" data-screen="quiz">
      <i class="fa-solid fa-circle-question"></i><span>問題</span>
    </button>
  </nav>

  <!-- ── Screen container ───────────────────────── -->
  <div class="screen-container" style="flex:1;position:relative;overflow:hidden;height:100%;">

    <!-- ══ HOME ══════════════════════════════════ -->
    <div id="screen-home" class="screen active">
      <div class="home-hero">
        <div class="home-logo"><i class="fa-solid fa-spell-check"></i></div>

        <div class="home-subtitle">English Vocabulary Trainer</div>
        <div class="home-stat">
          <i class="fa-solid fa-layer-group"></i>
          合計 <strong id="stat-total">–</strong> 単語 ／ お気に入り <strong id="stat-fav">–</strong> 件
        </div>
      </div>
      <div class="home-actions">
        <div class="home-card" onclick="navigate('list')">
          <div class="home-card-icon blue"><i class="fa-solid fa-table-list"></i></div>

            <h3>一覧で確認</h3>
            <p>単語と意味を一覧表示</p>
          </div>
          <i class="fa-solid fa-chevron-right home-card-arrow"></i>
        </div>
        <div class="home-card" onclick="navigate('quiz')">
          <div class="home-card-icon teal"><i class="fa-solid fa-graduation-cap"></i></div>
          <div class="home-card-body">

    </div>

    <!-- ══ LIST ═══════════════════════════════════ -->
    <div id="screen-list" class="screen">
      <div class="screen-header">
        <h2><i class="fa-solid fa-table-list" style="color:var(--primary);margin-right:8px;"></i>一覧</h2>
        <button class="icon-btn" id="btn-search-toggle" title="検索"><i class="fa-solid fa-magnifying-glass"></i></button>
        <button class="icon-btn" id="btn-show-all-meanings" title="意味を全て表示/非表示"><i class="fa-solid fa-eye"></i></button>
      </div>
      <div class="toolbar">
        <div class="search-bar" id="search-bar">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" id="search-input" placeholder="番号・単語・意味で検索…" autocomplete="off">
          <button class="search-clear" id="btn-search-clear"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="filter-row">
          <button class="chip" id="chip-fav-only"><i class="fa-solid fa-star"></i> お気に入りのみ</button>
          <div style="width:1px;height:20px;background:var(--border);flex-shrink:0;"></div>
          <button class="chip active" id="chip-sort-asc"  data-sort="asc"><i class="fa-solid fa-arrow-up-1-9"></i> 番号昇順</button>
          <button class="chip" id="chip-sort-desc" data-sort="desc"><i class="fa-solid fa-arrow-down-9-1"></i> 番号降順</button>
          <button class="chip" id="chip-sort-rand" data-sort="rand"><i class="fa-solid fa-shuffle"></i> ランダム</button>
        </div>
      </div>
      <div class="scroll-area">
        <div class="word-list" id="word-list"></div>
      </div>
    </div>

    <!-- ══ QUIZ ═══════════════════════════════════ -->
    <div id="screen-quiz" class="screen">
      <div class="screen-header">
        <h2><i class="fa-solid fa-graduation-cap" style="color:var(--accent);margin-right:8px;"></i>問題</h2>
      </div>

      <!-- Setup -->
      <div id="quiz-setup">
        <div class="setup-title">
          <h2>問題の設定</h2>
          <p>範囲と順番を選んでスタート</p>
        </div>

        <div class="setup-group">
          <div class="setup-label"><i class="fa-solid fa-bullseye"></i> 範囲</div>
          <div class="option-grid">
            <button class="option-btn selected" data-range="all">
              <i class="fa-solid fa-layer-group"></i>全ての単語
            </button>
            <button class="option-btn" data-range="fav">
              <i class="fa-solid fa-star"></i>お気に入りのみ
            </button>
          </div>
        </div>

        <div class="setup-group">
          <div class="setup-label"><i class="fa-solid fa-arrow-right-arrow-left"></i> 順番</div>
          <div class="option-grid three">
            <button class="option-btn selected" data-order="asc">
              <i class="fa-solid fa-arrow-up-1-9"></i>昇順
            </button>
            <button class="option-btn" data-order="desc">
              <i class="fa-solid fa-arrow-down-9-1"></i>降順
            </button>
            <button class="option-btn" data-order="rand">
              <i class="fa-solid fa-shuffle"></i>ランダム
            </button>
          </div>
        </div>

        <button class="start-btn" id="quiz-start-btn" onclick="startQuiz()">
          <i class="fa-solid fa-play"></i> スタート
        </button>
        <div id="quiz-setup-warn" style="font-size:13px;color:var(--danger);display:none;">
          <i class="fa-solid fa-triangle-exclamation"></i> お気に入りが登録されていません
        </div>
      </div>

      <!-- Card view -->
      <div id="quiz-card-view">
        <div class="quiz-progress-bar-wrap">
          <div class="quiz-progress-text">
            <span id="quiz-prog-label">1 / 10</span>
            <span id="quiz-prog-pct">0%</span>
          </div>
          <div class="quiz-progress-track">
            <div class="quiz-progress-fill" id="quiz-prog-fill" style="width:0%"></div>
          </div>
        </div>

        <div class="quiz-card-area">
          <div class="quiz-card" id="quiz-card">
            <button class="quiz-card-fav" id="quiz-fav-btn" onclick="toggleQuizFav()">
              <i class="fa-solid fa-star"></i>
            </button>
            <div class="quiz-word-num" id="quiz-num">#1</div>
            <div class="quiz-word" id="quiz-word">word</div>
            <div class="quiz-meaning" id="quiz-meaning-wrap">
              <div class="quiz-meaning-hidden" id="quiz-meaning-hidden">
                <i class="fa-solid fa-eye-slash"></i> タップして意味を表示
              </div>
              <div class="quiz-meaning-text" id="quiz-meaning-text" style="display:none;"></div>
            </div>
          </div>
        </div>

        <div class="quiz-footer">
          <button class="quiz-nav-btn" id="quiz-prev-btn" onclick="quizMove(-1)" title="前へ">
            <i class="fa-solid fa-chevron-left"></i>
          </button>
          <button class="quiz-reveal-btn" id="quiz-reveal-btn" onclick="toggleQuizMeaning()">
            <i class="fa-solid fa-eye"></i><span id="quiz-reveal-label">意味を表示</span>
          </button>
          <button class="quiz-nav-btn" id="quiz-next-btn" onclick="quizMove(1)" title="次へ">
            <i class="fa-solid fa-chevron-right"></i>
          </button>
          <button class="quiz-end-btn" onclick="endQuiz()" title="終了">
            <i class="fa-solid fa-xmark"></i>終了
          </button>
        </div>
      </div>
    </div>

  </div><!-- /screen-container -->
</div><!-- /app -->

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  STATE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let allWords    = [];           // { num, word, meaning }
let favorites   = new Set();    // Set of word num (number)

// List state
let listSort    = 'asc';        // 'asc' | 'desc' | 'rand'
let listFavOnly = false;
let listSearch  = '';
let listRandOrder = [];
let showAllMeanings = false;
let wordMeaningVisible = {};    // num -> bool

// Quiz state
let quizWords   = [];
let quizIdx     = 0;
let quizMeaningShown = false;
let quizRange   = 'all';        // 'all' | 'fav'
let quizOrder   = 'asc';        // 'asc' | 'desc' | 'rand'

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  INIT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
(async function init() {
  loadFavorites();

  try {
    const res  = await fetch('words.txt');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    allWords   = parseTxt(text);
  } catch (e) {
    document.querySelector('#loading p').textContent = 'words.txt の読み込みに失敗しました。同じディレクトリに words.txt を配置してください。';
    document.querySelector('#loading .spinner').style.display = 'none';
    return;
  }

  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display     = 'flex';
  refreshStats();
  renderList();
})();

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  PARSING
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function parseTxt(text) {
  return text.trim().split('\n')
    .map(line => line.trim())
    .filter(Boolean)
    .map(line => {
      const c1 = line.indexOf(',');
      const c2 = line.indexOf(',', c1 + 1);
      if (c1 < 0 || c2 < 0) return null;
      return {
        num:     parseInt(line.slice(0, c1)),
        word:    line.slice(c1 + 1, c2).trim(),
        meaning: line.slice(c2 + 1).trim()
      };
    })
    .filter(Boolean);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  NAVIGATION
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function navigate(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

  document.getElementById('screen-' + id).classList.add('active');
  document.querySelector(`.nav-btn[data-screen="${id}"]`).classList.add('active');

  if (id === 'list') renderList();
  if (id === 'home') refreshStats();
}

document.querySelectorAll('.nav-btn[data-screen]').forEach(btn => {
  btn.addEventListener('click', () => navigate(btn.dataset.screen));
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  FAVORITES (localStorage)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function loadFavorites() {
  try {
    const raw = localStorage.getItem('vocab_favorites');
    if (raw) favorites = new Set(JSON.parse(raw));
  } catch (_) {}
}
function saveFavorites() {
  localStorage.setItem('vocab_favorites', JSON.stringify([...favorites]));
}
function toggleFavorite(num) {
  if (favorites.has(num)) favorites.delete(num);
  else                     favorites.add(num);
  saveFavorites();
  refreshStats();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  HOME
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function refreshStats() {
  document.getElementById('stat-total').textContent = allWords.length;
  document.getElementById('stat-fav').textContent   = favorites.size;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  LIST SCREEN
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function getListWords() {
  let words = [...allWords];

  // Filter
  if (listFavOnly) words = words.filter(w => favorites.has(w.num));
  if (listSearch.trim()) {
    const q = listSearch.trim().toLowerCase();
    words = words.filter(w =>
      String(w.num).includes(q) ||
      w.word.toLowerCase().includes(q) ||
      w.meaning.includes(q)
    );
  }

  // Sort
  if (listSort === 'asc')  words.sort((a, b) => a.num - b.num);
  if (listSort === 'desc') words.sort((a, b) => b.num - a.num);
  if (listSort === 'rand') {
    // Keep stable random until filter/search changes
    words.sort((a, b) => {
      const ia = listRandOrder.indexOf(a.num);
      const ib = listRandOrder.indexOf(b.num);
      return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
    });
  }
  return words;
}

function renderList() {
  const words = getListWords();
  const container = document.getElementById('word-list');

  if (!words.length) {
    container.innerHTML = `
      <div class="empty-state">
        <i class="fa-solid fa-box-open"></i>
        <p>表示できる単語がありません</p>
      </div>`;
    return;
  }

  container.innerHTML = '';
  words.forEach(w => {
    const isFav = favorites.has(w.num);
    const isVisible = wordMeaningVisible[w.num] ?? showAllMeanings;

    const card = document.createElement('div');
    card.className = 'word-card fade-in';
    card.innerHTML = `
      <div class="word-num">${w.num}</div>
      <div class="word-en">${escHtml(w.word)}</div>
      <div class="word-controls">
        <button class="star-btn ${isFav ? 'starred' : ''}" title="お気に入り" onclick="listToggleFav(${w.num}, this)">
          <i class="fa-${isFav ? 'solid' : 'regular'} fa-star"></i>
        </button>
        <button class="toggle-meaning-btn ${isVisible ? 'revealed' : ''}" title="意味の表示切替" onclick="listToggleMeaning(${w.num}, this)">
          <i class="fa-solid fa-${isVisible ? 'eye-slash' : 'eye'}"></i>
        </button>
      </div>
      <div class="word-jp ${isVisible ? '' : 'hidden'}" id="meaning-${w.num}" onclick="listToggleMeaningByClick(${w.num})">
        ${escHtml(w.meaning)}
      </div>`;
    container.appendChild(card);
  });
}

function listToggleFav(num, btn) {
  toggleFavorite(num);
  const isFav = favorites.has(num);
  btn.className = 'star-btn ' + (isFav ? 'starred' : '');
  btn.innerHTML = `<i class="fa-${isFav ? 'solid' : 'regular'} fa-star"></i>`;
}

function listToggleMeaning(num, btn) {
  wordMeaningVisible[num] = !(wordMeaningVisible[num] ?? showAllMeanings);
  const vis = wordMeaningVisible[num];
  const el  = document.getElementById('meaning-' + num);
  if (el) el.className = 'word-jp ' + (vis ? '' : 'hidden');
  btn.className = 'toggle-meaning-btn ' + (vis ? 'revealed' : '');
  btn.innerHTML = `<i class="fa-solid fa-${vis ? 'eye-slash' : 'eye'}"></i>`;
}

function listToggleMeaningByClick(num) {
  const btn = document.querySelector(`.word-card .toggle-meaning-btn`);
  const el  = document.getElementById('meaning-' + num);
  if (!el) return;
  const nowHidden = el.classList.contains('hidden');
  wordMeaningVisible[num] = nowHidden;
  el.className = 'word-jp ' + (nowHidden ? '' : 'hidden');
  // Update toggle btn icon
  const cards = document.querySelectorAll('.word-card');
  cards.forEach(c => {
    const numEl = c.querySelector('.word-num');
    if (numEl && parseInt(numEl.textContent) === num) {
      const tb = c.querySelector('.toggle-meaning-btn');
      tb.className = 'toggle-meaning-btn ' + (nowHidden ? 'revealed' : '');
      tb.innerHTML = `<i class="fa-solid fa-${nowHidden ? 'eye-slash' : 'eye'}"></i>`;
    }
  });
}

// Search
document.getElementById('btn-search-toggle').addEventListener('click', () => {
  const bar = document.getElementById('search-bar');
  const btn = document.getElementById('btn-search-toggle');
  const open = bar.classList.toggle('open');
  btn.classList.toggle('active', open);
  if (open) document.getElementById('search-input').focus();
  else { document.getElementById('search-input').value = ''; listSearch = ''; renderList(); }
});
document.getElementById('search-input').addEventListener('input', e => {
  listSearch = e.target.value;
  renderList();
});
document.getElementById('btn-search-clear').addEventListener('click', () => {
  document.getElementById('search-input').value = '';
  listSearch = '';
  renderList();
});

// Show all meanings toggle
document.getElementById('btn-show-all-meanings').addEventListener('click', function() {
  showAllMeanings = !showAllMeanings;
  wordMeaningVisible = {};
  this.classList.toggle('active', showAllMeanings);
  this.querySelector('i').className = `fa-solid fa-${showAllMeanings ? 'eye-slash' : 'eye'}`;
  this.title = showAllMeanings ? '意味を全て非表示' : '意味を全て表示';
  renderList();
});

// Fav filter
document.getElementById('chip-fav-only').addEventListener('click', function() {
  listFavOnly = !listFavOnly;
  this.classList.toggle('active', listFavOnly);
  renderList();
});

// Sort chips
document.querySelectorAll('.chip[data-sort]').forEach(chip => {
  chip.addEventListener('click', function() {
    document.querySelectorAll('.chip[data-sort]').forEach(c => c.classList.remove('active'));
    this.classList.add('active');
    listSort = this.dataset.sort;
    if (listSort === 'rand') {
      listRandOrder = shuffle([...allWords].map(w => w.num));
    }
    renderList();
  });
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  QUIZ SCREEN
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

// Option buttons
document.querySelectorAll('.option-btn[data-range]').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.option-btn[data-range]').forEach(b => b.classList.remove('selected'));
    this.classList.add('selected');
    quizRange = this.dataset.range;
    validateQuizSetup();
  });
});
document.querySelectorAll('.option-btn[data-order]').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.option-btn[data-order]').forEach(b => b.classList.remove('selected'));
    this.classList.add('selected');
    quizOrder = this.dataset.order;
  });
});

function validateQuizSetup() {
  const warn = document.getElementById('quiz-setup-warn');
  const btn  = document.getElementById('quiz-start-btn');
  if (quizRange === 'fav' && favorites.size === 0) {
    warn.style.display = 'flex';
    btn.disabled = true;
  } else {
    warn.style.display = 'none';
    btn.disabled = false;
  }
}

function startQuiz() {
  let words = quizRange === 'fav'
    ? allWords.filter(w => favorites.has(w.num))
    : [...allWords];

  if (!words.length) { validateQuizSetup(); return; }

  if (quizOrder === 'asc')  words.sort((a,b) => a.num - b.num);
  if (quizOrder === 'desc') words.sort((a,b) => b.num - a.num);
  if (quizOrder === 'rand') words = shuffle(words);

  quizWords = words;
  quizIdx   = 0;

  document.getElementById('quiz-setup').style.display    = 'none';
  document.getElementById('quiz-card-view').classList.add('active');

  renderQuizCard();
}

function endQuiz() {
  document.getElementById('quiz-card-view').classList.remove('active');
  document.getElementById('quiz-setup').style.display = 'flex';
  validateQuizSetup();
}

function renderQuizCard() {
  const w   = quizWords[quizIdx];
  const tot = quizWords.length;
  const pct = Math.round(((quizIdx + 1) / tot) * 100);

  document.getElementById('quiz-num').textContent   = '#' + w.num;
  document.getElementById('quiz-word').textContent  = w.word;
  document.getElementById('quiz-prog-label').textContent = `${quizIdx + 1} / ${tot}`;
  document.getElementById('quiz-prog-pct').textContent   = pct + '%';
  document.getElementById('quiz-prog-fill').style.width  = pct + '%';

  // Meaning
  quizMeaningShown = false;
  document.getElementById('quiz-meaning-hidden').style.display = 'flex';
  document.getElementById('quiz-meaning-text').style.display   = 'none';
  document.getElementById('quiz-meaning-text').textContent     = w.meaning;
  document.getElementById('quiz-reveal-label').textContent     = '意味を表示';
  document.getElementById('quiz-reveal-btn').querySelector('i').className = 'fa-solid fa-eye';

  // Fav
  const isFav = favorites.has(w.num);
  const favBtn = document.getElementById('quiz-fav-btn');
  favBtn.className = 'quiz-card-fav ' + (isFav ? 'starred' : '');
  favBtn.querySelector('i').className = `fa-${isFav ? 'solid' : 'regular'} fa-star`;

  // Nav buttons
  document.getElementById('quiz-prev-btn').disabled = quizIdx === 0;
  document.getElementById('quiz-next-btn').disabled = quizIdx === tot - 1;

  // Animate card
  const card = document.getElementById('quiz-card');
  card.style.animation = 'none';
  void card.offsetWidth;
  card.style.animation = 'fadeIn .3s ease';
}

function toggleQuizMeaning() {
  quizMeaningShown = !quizMeaningShown;
  document.getElementById('quiz-meaning-hidden').style.display = quizMeaningShown ? 'none' : 'flex';
  document.getElementById('quiz-meaning-text').style.display   = quizMeaningShown ? 'block' : 'none';
  document.getElementById('quiz-reveal-label').textContent     = quizMeaningShown ? '意味を隠す' : '意味を表示';
  document.getElementById('quiz-reveal-btn').querySelector('i').className = `fa-solid fa-${quizMeaningShown ? 'eye-slash' : 'eye'}`;
}

function quizMove(dir) {
  const next = quizIdx + dir;
  if (next < 0 || next >= quizWords.length) return;
  quizIdx = next;
  renderQuizCard();
}

function toggleQuizFav() {
  const w = quizWords[quizIdx];
  toggleFavorite(w.num);
  const isFav = favorites.has(w.num);
  const btn   = document.getElementById('quiz-fav-btn');
  btn.className = 'quiz-card-fav ' + (isFav ? 'starred' : '');
  btn.querySelector('i').className = `fa-${isFav ? 'solid' : 'regular'} fa-star`;
}

// Meaning tap on hidden area
document.getElementById('quiz-meaning-hidden').addEventListener('click', toggleQuizMeaning);

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  UTILITIES
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
